apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: inference-service
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/AdilQuantum/nexus-mlops-platform
    targetRevision: HEAD
    path: gitops/rollouts
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true