apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: inference-service
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: inference-service
  template:
    metadata:
      labels:
        app: inference-service
    spec:
      containers:
        - name: inference
          image: 352126234584.dkr.ecr.ap-south-1.amazonaws.com/nexus-mlops-inference:626a76be9acf900c3f2e5be6e69158f6ab043f40
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          command: ["uvicorn"]
          args: ["app:app", "--host", "0.0.0.0", "--port", "8000"]
          env:
            - name: MLFLOW_TRACKING_URI
              value: http://mlflow.mlflow.svc.cluster.local:5000
            - name: MLFLOW_RUN_ID
              value: "5a2fec6ad0f84939b3cc1a630d0aec3a"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 3
  strategy:
    canary:
      steps:
        - setWeight: 50
        - pause: {duration: 60s}
        - analysis:
            templates:
              - templateName: inference-success-rate
        - setWeight: 100
