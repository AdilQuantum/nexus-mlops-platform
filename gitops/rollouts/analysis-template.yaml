apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: inference-success-rate
  namespace: default
spec:
  metrics:
  - name: pod-readiness
    interval: 15s
    count: 3
    successCondition: result >= 1
    failureLimit: 1
    provider:
      prometheus:
        address: http://prometheus-kube-prometheus-prometheus.monitoring.svc.cluster.local:9090
        query: |
          scalar(sum(kube_pod_container_status_ready{namespace="default",container="inference"}))
