name: Nexus MLOps CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: nexus-mlops-inference
  EKS_CLUSTER: nexus-mlops-cluster

jobs:
  lint-test:
    name: Lint and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install flake8 pytest pytest-cov
          pip install -r ml/inference/requirements.txt

      - name: Lint
        run: flake8 ml/ --max-line-length=100

      - name: Test
        run: |
          pytest ml/training/test_train.py --cov=ml/training --cov-fail-under=70

  security-scan:
    name: Security Gates
    runs-on: ubuntu-latest
    needs: lint-test
    steps:
      - uses: actions/checkout@v4

      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: 1

      - name: OWASP dependency check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: nexus-mlops
          path: .
          format: HTML

  build-push:
    name: Build and Push to ECR
    runs-on: ubuntu-latest
    needs: security-scan
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          docker build \
            --platform linux/amd64 \
            -t ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }} \
            ml/inference/

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          severity: CRITICAL
          exit-code: 1

      - name: Push to ECR
        run: |
          docker push \
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}

      - name: Update GitOps repo
        run: |
          sed -i "s|image:.*|image: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}|g" \
            gitops/rollouts/inference-canary.yaml
          git config user.email "ci@nexus-mlops.com"
          git config user.name "GitHub Actions"
          git add gitops/rollouts/inference-canary.yaml
          git commit -m "ci: update image tag to ${{ github.sha }}"
          git push