name: Nexus MLOps CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: nexus-mlops-inference
  EKS_CLUSTER: nexus-mlops-cluster

jobs:
  lint-test:
    name: Lint and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install flake8 pytest pytest-cov
          pip install -r ml/inference/requirements.txt

      - name: Lint
        run: flake8 ml/ --max-line-length=100

      - name: Test
        run: |
          pytest ml/training/test_train.py --cov=ml/training --cov-fail-under=40

  security-scan:
    name: Security Gates
    runs-on: ubuntu-latest
    needs: lint-test
    steps:
      - uses: actions/checkout@v4

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: 1
          format: table
          output: trivy-fs-report.txt

      - name: Upload Trivy filesystem report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-filesystem-report
          path: trivy-fs-report.txt

      - name: OWASP dependency check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: nexus-mlops
          path: .
          format: HTML
          out: owasp-report

      - name: Upload OWASP report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: owasp-dependency-report
          path: owasp-report

  build-push:
    name: Build and Push to ECR
    runs-on: ubuntu-latest
    needs: security-scan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          docker build \
            --platform linux/amd64 \
            -t ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }} \
            ml/inference/

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          severity: CRITICAL
          exit-code: 1
          output: trivy-image-report.txt

      - name: Upload Trivy image report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-image-report
          path: trivy-image-report.txt

      - name: Push to ECR
        run: |
          docker push \
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}

      - name: Update image tag in k8s manifest
        run: |
          ECR_IMAGE="${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}"
          sed -i "s|image: .*nexus-mlops-inference.*|image: ${ECR_IMAGE}|g" k8s/inference-deployment.yaml
          git config user.email "ci@nexus-mlops.com"
          git config user.name "GitHub Actions"
          git add k8s/inference-deployment.yaml
          git commit -m "ci: update inference image to ${{ github.sha }}"
          git push